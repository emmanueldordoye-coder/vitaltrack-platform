name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    name: ${{ matrix.workspace }} quality
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        workspace: [frontend, backend]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Lint
        run: npm run lint --workspace=${{ matrix.workspace }}

      - name: Type-check
        run: npm run type-check --workspace=${{ matrix.workspace }}

      - name: Test frontend (if present)
        if: matrix.workspace == 'frontend'
        run: npm run test --workspace=frontend --if-present

      - name: Test backend (non-blocking while stabilizing)
        if: matrix.workspace == 'backend'
        continue-on-error: true
        run: npm run test --workspace=backend --if-present
